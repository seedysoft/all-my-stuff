# -v  | --verbosity <LEVEL> # Allowed values are q[uiet], m[inimal], n[ormal], d[etailed], and diag[nostic]. The default is minimal.

name: CI

defaults:
  run:
    shell: bash

env:
  SEEDY_MASTER_KEY: ${{ secrets.SEEDY_MASTER_KEY }}

on:
  pull_request:
  push:
    branches-ignore:
    - 'feat/use-artifacts-version'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@main
    - name: Setup dotnet
      uses: actions/setup-dotnet@main
      with:
        dotnet-version: 8
    - name: Build solution
      run: |
        dotnet workload install wasm-tools
        dotnet build Seedysoft.Tests.sln -c Release -v n
    - name: Test
      run: dotnet test Seedysoft.Tests.sln -c Release --no-build -v n
